<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Airtel IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-wrapper">
    <div class="card login-box">
        <h2>Airtel Inventory</h2>
        <!-- Display developers' names -->
        <p style="text-align: center; font-size: 0.85rem; color: #666; margin-top: -10px;">
            Developed by: <strong>Regis</strong> & <strong>Olive</strong>
        </p>
        <div th:if="${error}" class="alert" th:text="${error}"></div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%">Login</button>
        </form>
        <!-- Optional hint for demo credentials -->
        <p style="text-align: center; font-size: 0.75rem; margin-top: 15px;">
            <P>Username: 24RP06444</P> 
            <P>Password: 24RP11469</P>
        </p>
    </div>
</body>
</html>
