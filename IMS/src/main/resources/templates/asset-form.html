<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Asset Form - Airtel IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Airtel Inventory System</a>
        <div class="navbar-nav">
            <a href="/">Dashboard</a>
            <a href="/assets" class="active">Assets</a>
            <a href="/assignments">Assignments</a>
            <a href="/reports">Reports</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Register / Update Asset</h2>
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <form th:action="@{/assets/save}" th:object="${asset}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="form-group">
                    <label>Tag Number (Unique)</label>
                    <input type="text" th:field="*{tagNumber}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Device Type</label>
                    <select th:field="*{deviceType}" class="form-control" required>
                        <option value="Laptop">Laptop</option>
                        <option value="Desktop">Desktop</option>
                        <option value="Mobile Phone">Mobile Phone</option>
                        <option value="Tablet">Tablet</option>
                        <option value="Network Device">Network Device</option>
                    </select>
                </div>
                
                <div class="grid">
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" th:field="*{brand}" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" th:field="*{model}" class="form-control">
                    </div>
                </div>

                <div class="form-group">
                    <label>Serial Number</label>
                    <input type="text" th:field="*{serialNumber}" class="form-control">
                </div>

                <div class="form-group">
                    <label>Condition Status</label>
                    <select th:field="*{conditionStatus}" class="form-control">
                        <option value="New">New</option>
                        <option value="Good">Good</option>
                        <option value="Fair">Fair</option>
                        <option value="Poor">Poor</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Purchase Date</label>
                    <input type="date" th:field="*{purchaseDate}" class="form-control">
                </div>

                <div class="form-group">
                    <label>Specifications</label>
                    <textarea th:field="*{specifications}" class="form-control" rows="3"></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn">Save Asset</button>
                    <a href="/assets" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
