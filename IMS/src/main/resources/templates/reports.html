<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reports - Airtel IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Airtel Inventory System</a>
        <div class="navbar-nav">
            <a href="/">Dashboard</a>
            <a href="/assets">Assets</a>
            <a href="/assignments">Assignments</a>
            <a href="/reports" class="active">Reports</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Audit History & Reports</h2>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Asset Tag</th>
                        <th>Action</th>
                        <th>Details</th>
                        <th>Performed By</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="log : ${auditLogs}">
                        <td th:text="${#temporals.format(log.actionDate, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${log.asset.tagNumber}"></td>
                        <td>
                            <span class="badge available" th:text="${log.action}"></span>
                        </td>
                        <td th:text="${log.details}"></td>
                        <td th:text="${log.performedBy}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(auditLogs)}">
                        <td colspan="5" style="text-align: center;">No audit logs found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
