<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issue Asset  Airtel IMS</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">Airtel Inventory System</a>
        <div class="navbar-nav">
            <a href="/">Dashboard</a>
            <a href="/assets">Assets</a>
            <a href="/assignments" class="active">Assignments</a>
            <a href="/reports">Reports</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container">
        <h2>Issue Asset</h2>
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <h4 style="margin: 0 0 10px 0; color: var(--primary-color);">Asset Details</h4>
                <p style="margin: 5px 0;"><strong>Tag:</strong> <span th:text="${assignment.asset.tagNumber}"></span></p>
                <p style="margin: 5px 0;"><strong>Device:</strong> <span th:text="${assignment.asset.deviceType + ' - ' + assignment.asset.brand + ' ' + assignment.asset.model}"></span></p>
            </div>

            <form th:action="@{/assignments/save}" th:object="${assignment}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{asset.id}">

                <div class="form-group">
                    <label>Employee Name</label>
                    <input type="text" th:field="*{employeeName}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" th:field="*{department}" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Remarks</label>
                    <textarea th:field="*{remarks}" class="form-control" rows="3"></textarea>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn">Issue Asset</button>
                    <a href="/assets" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
